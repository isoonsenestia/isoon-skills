# Wiki Auto-Ingest — runs on PR merge to main
# Detects changed files, runs wiki agent, opens a wiki-update PR
name: Wiki Auto-Ingest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/wiki/**'
      - '*.md'
      - '.github/**'

concurrency:
  group: wiki-ingest
  cancel-in-progress: false

jobs:
  wiki-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -v '^docs/' | grep -v '\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Install Claude Code
        if: steps.changes.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run wiki auto-ingest
        if: steps.changes.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CHANGED_FILES=$(cat /tmp/changed-files.txt | tr '\n' ', ')
          claude -p "You are the wiki agent for this repo. Read docs/WIKI-SCHEMA.md first.
          Run the Auto-Ingest operation for these changed files: ${CHANGED_FILES}
          Follow the Auto-Ingest workflow exactly as defined in WIKI-SCHEMA.md.
          Update wiki pages, manifest.json, index.md, and log.md as needed.
          Do NOT delete any existing pages. Flag contradictions, don't resolve them."

      - name: Check for wiki changes
        if: steps.changes.outputs.skip == 'false'
        id: wiki-changes
        run: |
          if git diff --quiet docs/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create wiki update PR
        if: steps.wiki-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="wiki-update/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add docs/
          git commit -m "docs: auto-ingest wiki updates from $(git log -1 --format='%h %s' HEAD)"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: wiki auto-ingest from $(git log -1 --format='%h' HEAD)" \
            --body "## Wiki Auto-Ingest

          Triggered by: $(git log -1 --format='%h %s' HEAD)

          **Changed source files:**
          $(cat /tmp/changed-files.txt | sed 's/^/- /')

          **Review checklist:**
          - [ ] Wiki page updates look accurate
          - [ ] No contradictions were silently resolved
          - [ ] manifest.json reflects any API surface changes
          - [ ] Cross-repo links are valid

          _Auto-generated by wiki-ingest CI_" \
            --label "documentation"
